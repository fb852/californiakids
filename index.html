<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Paris Los Angeles 2026</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f5f1e8;color:#20242b}header{text-align:center;padding:28px 12px}.wrap{max-width:1100px;margin:auto;padding:0 14px 40px}.card{background:#fff;border:1px solid #ddd6ca;border-radius:16px;padding:18px;margin:12px 0;box-shadow:0 8px 22px #00000010}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button,.actions button{border:0;border-radius:24px;padding:10px 15px;font-weight:bold;cursor:pointer}.tabs button{background:#eee}.tabs button.on{background:#286b75;color:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.actions button{background:#20242b;color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.bet{display:flex;gap:10px;padding:9px;border-radius:9px}.bet:hover{background:#f5f1e8}.bet input{width:19px;height:19px}.count{color:#6b7280;font-size:14px}.bonus{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;margin:10px 0}select{padding:9px;border:1px solid #ccc;border-radius:8px}.hide{display:none}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #ddd}@media(max-width:700px){.grid{grid-template-columns:1fr}.bonus{grid-template-columns:1fr}}</style></head><body><header><h1>Les Paris des Parents</h1><p>Colo Los Angeles 2026 — maximum 3 réponses par enfant et par joueur</p></header><div class="wrap"><div class="card"><b>Joueur actif</b><div id="tabs" class="tabs"></div></div><div class="actions"><button onclick="results()">Mode résultats</button><button onclick="window.print()">Imprimer</button><button onclick="resetAll()">Réinitialiser</button></div><div id="game"><div id="kids" class="grid"></div><div class="card"><h2>Paris collectifs</h2><div id="collective"></div></div><div class="card"><h2>Bonus : qui sera le premier ?</h2><div id="bonus"></div></div></div><div id="res" class="hide"><div class="card"><h2>Valider les résultats</h2><div id="checks"></div></div><div class="card"><h2>Classement</h2><table><thead><tr><th>Joueur</th><th>Points</th><th>Paris</th><th>Réussite</th></tr></thead><tbody id="scores"></tbody></table><button onclick="back()">Retour aux paris</button></div></div></div><script>
const D={players:["Shimon","Rachel","Audray","Fabrice"],children:{Shai:["Demandera le mot de passe du Wi-Fi avant de dire bonjour.","Gardera son oreillette plus de 18 heures d’affilée.","Répondra « Attends, je suis en game » à un animateur.","Se fera rappeler à l’ordre parce qu’il joue après l’extinction des feux.","Découvrira une vraie vie pendant au moins 15 minutes.","Ne remarquera pas qu’il est à Los Angeles pendant deux jours."],Noam:["Trouvera un outlet avant les animateurs.","Demandera : « On peut passer cinq minutes chez Nike ? »","Achètera quelque chose d’absolument inutile.","Convaincra trois copains d’aller faire du shopping.","Dira : « C’est moins cher qu’en Europe. »","Rentrera avec une valise plus lourde qu’à l’aller."],Harry:["Lancera une idée par : « J’ai une super idée… »","Finira par : « Les animateurs ne vont jamais accepter. »","Perdra quelque chose dans les 72 premières heures.","Sera au centre d’une histoire racontée au retour.","Échappera de peu à une catastrophe grâce à un animateur.","Dira : « Franchement, ça valait le coup ! »"],Elly:["Identifiera les meilleurs magasins dès le premier jour.","Fera une skincare complète dans une chambre de six filles.","Prendra plus de photos de Sephora que de Hollywood.","Donnera des conseils beauté à une copine.","Achètera un produit « introuvable en France ».","Passera plus de temps chez Sephora que sur la plage."]},collective:["Quelqu’un dira : « La nourriture est bizarre. »","Au moins un enfant oubliera une serviette.","Quelqu’un demandera un Starbucks.","Les quatre passeront les meilleures vacances de leur été.","Les parents regarderont davantage la localisation que leurs messages.","Au retour, ils demanderont la date de la prochaine colo."],bonus:["Se faire un nouveau meilleur ami","Dire « Je veux rester ici ! »","Dépenser tout son argent de poche","Perdre quelque chose","Se faire reprendre par un animateur","Demander un Starbucks","Dire que la colo était incroyable"]};
const K="la-bets-2026";let S=JSON.parse(localStorage.getItem(K)||"null")||{p:D.players[0],b:{},r:{c:{},g:{},x:{}}};D.players.forEach(p=>{S.b[p]??={c:{},g:{},x:{}};Object.keys(D.children).forEach(k=>S.b[p].c[k]??={})});Object.keys(D.children).forEach(k=>S.r.c[k]??={});const save=()=>localStorage.setItem(K,JSON.stringify(S)),n=(p,k)=>Object.values(S.b[p].c[k]).filter(Boolean).length;
function render(){tabs.innerHTML="";D.players.forEach(p=>{let b=document.createElement("button");b.textContent=p;b.className=S.p==p?"on":"";b.onclick=()=>{S.p=p;save();render()};tabs.appendChild(b)});kids.innerHTML="";Object.entries(D.children).forEach(([k,a])=>{let c=document.createElement("div");c.className="card";c.innerHTML=`<h2>${k}</h2><div class=count>${S.p} : ${n(S.p,k)} / 3</div>`;a.forEach((t,i)=>{let r=document.createElement("label");r.className="bet";r.innerHTML=`<input type=checkbox ${S.b[S.p].c[k][i]?"checked":""}><span>${t}</span>`;r.firstChild.onchange=e=>{if(e.target.checked&&n(S.p,k)>=3){e.target.checked=false;alert("Maximum trois paris par enfant.");return}S.b[S.p].c[k][i]=e.target.checked;save();render()};c.appendChild(r)});kids.appendChild(c)});collective.innerHTML="";D.collective.forEach((t,i)=>{let r=document.createElement("label");r.className="bet";r.innerHTML=`<input type=checkbox ${S.b[S.p].g[i]?"checked":""}><span>${t}</span>`;r.firstChild.onchange=e=>{S.b[S.p].g[i]=e.target.checked;save()};collective.appendChild(r)});bonus.innerHTML="";D.bonus.forEach((t,i)=>{let r=document.createElement("div");r.className="bonus";r.innerHTML=`<b>${t}</b><select><option value="">Choisir</option>${Object.keys(D.children).map(x=>`<option>${x}</option>`).join("")}</select>`;r.lastChild.value=S.b[S.p].x[i]||"";r.lastChild.onchange=e=>{S.b[S.p].x[i]=e.target.value;save()};bonus.appendChild(r)})}
function results(){game.classList.add("hide");res.classList.remove("hide");checks.innerHTML="";Object.entries(D.children).forEach(([k,a])=>{checks.insertAdjacentHTML("beforeend",`<h3>${k}</h3>`);a.forEach((t,i)=>addCheck(t,!!S.r.c[k][i],v=>S.r.c[k][i]=v))});checks.insertAdjacentHTML("beforeend","<h3>Collectifs</h3>");D.collective.forEach((t,i)=>addCheck(t,!!S.r.g[i],v=>S.r.g[i]=v));checks.insertAdjacentHTML("beforeend","<h3>Bonus</h3>");D.bonus.forEach((t,i)=>{let r=document.createElement("div");r.className="bonus";r.innerHTML=`<b>${t}</b><select><option value="">Non déterminé</option>${Object.keys(D.children).map(x=>`<option>${x}</option>`).join("")}</select>`;r.lastChild.value=S.r.x[i]||"";r.lastChild.onchange=e=>{S.r.x[i]=e.target.value;save();score()};checks.appendChild(r)});score()}
function addCheck(t,v,fn){let r=document.createElement("label");r.className="bet";r.innerHTML=`<input type=checkbox ${v?"checked":""}><span>${t}</span>`;r.firstChild.onchange=e=>{fn(e.target.checked);save();score()};checks.appendChild(r)}function stat(p){let tot=0,pts=0;Object.entries(D.children).forEach(([k,a])=>a.forEach((_,i)=>{if(S.b[p].c[k][i]){tot++;if(S.r.c[k][i])pts++}}));D.collective.forEach((_,i)=>{if(S.b[p].g[i]){tot++;if(S.r.g[i])pts++}});D.bonus.forEach((_,i)=>{if(S.b[p].x[i]){tot++;if(S.b[p].x[i]==S.r.x[i])pts++}});return{p,tot,pts}}function score(){scores.innerHTML="";D.players.map(stat).sort((a,b)=>b.pts-a.pts).forEach(x=>scores.insertAdjacentHTML("beforeend",`<tr><td><b>${x.p}</b></td><td>${x.pts}</td><td>${x.tot}</td><td>${x.tot?Math.round(x.pts/x.tot*100):0}%</td></tr>`))}function back(){res.classList.add("hide");game.classList.remove("hide")}function resetAll(){if(confirm("Tout effacer ?")){localStorage.removeItem(K);location.reload()}}render();
</script></body></html>
